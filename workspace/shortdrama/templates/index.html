<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短剧制作自动化工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
        .hint {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>短剧制作自动化工具</h1>
        <form action="/generate" method="post">
            <div class="form-group">
                <label for="topic">短剧主题</label>
                <input type="text" id="topic" name="topic" required placeholder="例如：咖啡店的邂逅">
            </div>
            <div class="form-group">
                <label for="genre">短剧类型</label>
                <select id="genre" name="genre">
                    <option value="爱情">爱情</option>
                    <option value="喜剧">喜剧</option>
                    <option value="悲剧">悲剧</option>
                    <option value="科幻">科幻</option>
                    <option value="悬疑">悬疑</option>
                </select>
            </div>
            <div class="form-group">
                <label for="duration">短剧时长</label>
                <input type="text" id="duration" name="duration" value="5分钟" placeholder="例如：5分钟">
            </div>
            <div class="form-group">
                <label for="characters">角色列表</label>
                <input type="text" id="characters" name="characters" value="小明, 小红" placeholder="例如：小明, 小红">
                <div class="hint">多个角色用逗号分隔</div>
            </div>
            <div class="form-group">
                <label for="setting">场景设置</label>
                <input type="text" id="setting" name="setting" value="咖啡店" placeholder="例如：咖啡店">
            </div>
            <button type="submit">生成短剧</button>
        </form>
    </div>
</body>
</html>
